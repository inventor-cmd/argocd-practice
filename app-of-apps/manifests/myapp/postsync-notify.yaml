apiVersion: batch/v1
kind: Job
metadata:
  name: post-sync-notify
  namespace: myapp
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: notify
        image: busybox
        command:
        - sh
        - -c
        - echo "Deployment successful! Notifying team..."