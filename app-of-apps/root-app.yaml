apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: origin-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/inventor-cmd/argocd-practice.git
    targetRevision: main
    path: app-of-apps/helm-app
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true