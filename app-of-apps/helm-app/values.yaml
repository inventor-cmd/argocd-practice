config:
  spec:
    destination:
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/inventor-cmd/argocd-practice.git 
      targetRevision: main
      path: app-of-apps/helm-app

applications:
  - name: nginx
    path: app-of-apps/manifests/nginx
    tool:
      helm:
        releaseName: nginx
  - name: monitoring
    path: app-of-apps/manifests/monitoring
    tool:
      helm:
        releaseName: monitoring
